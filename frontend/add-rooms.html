<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Room — Hotel Management</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="dashboard.html" class="brand">Hotel Manager</a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="rooms.html">Rooms</a>
        <a href="add-rooms.html" class="active">Add Room</a>
        <button class="btn btn-sm btn-secondary btn-logout" onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="page-wrapper">
      <div class="card">
        <h2>Add New Room</h2>
        <p class="subtitle">Fill in the room details below</p>

        <div class="form-group">
          <label for="room_number">Room Number</label>
          <input id="room_number" type="text" placeholder="e.g. 101" />
        </div>

        <div class="form-group">
          <label for="type">Room Type</label>
          <select id="type">
            <option value="">Select type</option>
            <option value="1">Single — ₹5,000</option>
            <option value="2">Double — ₹8,000</option>
            <option value="3">Deluxe — ₹10,000</option>
          </select>
        </div>

        <div class="form-group">
          <label for="price">Price (auto-filled)</label>
          <input type="number" id="price" readonly placeholder="Auto-filled by type" />
        </div>

        <div class="form-group">
          <label for="status">Status</label>
          <select id="status">
            <option value="available">Available</option>
            <option value="Booked">Booked</option>
          </select>
        </div>

        <button class="btn btn-primary btn-full" onclick="addRoom()">Add Room</button>
      </div>
    </div>

    <script>
      const userData = localStorage.getItem("user");
      if (!userData) window.location.href = "login.html";
      try { const u = JSON.parse(userData); if (!u || !u.user_id) window.location.href = "login.html"; } catch { window.location.href = "login.html"; }

      function logout() {
        localStorage.removeItem("user");
        window.location.href = "login.html";
      }

      function updatePrice() {
        const type = document.getElementById("type").value;
        const prices = { 1: 5000, 2: 8000, 3: 10000 };
        document.getElementById("price").value = prices[type] || "";
      }

      document.getElementById("type").addEventListener("change", updatePrice);

      function addRoom() {
        fetch("http://localhost:3000/add-room", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            room_number: document.getElementById("room_number").value,
            type_id: Number(document.getElementById("type").value),
            status: document.getElementById("status").value,
          }),
        })
          .then((res) => res.text())
          .then((data) => {
            alert(data);
            document.getElementById("room_number").value = "";
            document.getElementById("type").value = "";
            document.getElementById("price").value = "";
            document.getElementById("status").value = "available";
          });
      }
    </script>
  </body>
</html>
