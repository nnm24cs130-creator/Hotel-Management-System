<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Hotel Management</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your account</p>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" />
        </div>

        <button class="btn btn-primary btn-full" onclick="login()">Login</button>

        <p class="text-center mt-lg">
          Don't have an account? <a href="register.html" class="link">Register</a>
        </p>
      </div>
    </div>

    <script>
      function login() {
        fetch("http://localhost:3000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
          }),
        })
          .then((res) => {
            if (!res.ok) return res.text().then((text) => Promise.reject(text));
            return res.json();
          })
          .then((user) => {
            localStorage.setItem("user", JSON.stringify(user));
            window.location.href = "dashboard.html";
          })
          .catch((errorMessage) => {
            alert(errorMessage);
          });
      }
    </script>
  </body>
</html>
