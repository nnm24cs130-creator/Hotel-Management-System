<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — Hotel Management</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="card">
        <h2>Create Account</h2>
        <p class="subtitle">Join our hotel management platform</p>

        <div class="form-group">
          <label for="name">Full Name</label>
          <input id="name" type="text" placeholder="John Doe" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" />
        </div>

        <button class="btn btn-primary btn-full" onclick="register()">Register</button>

        <p class="text-center mt-lg">
          Already have an account? <a href="login.html" class="link">Login</a>
        </p>
      </div>
    </div>

    <script>
      function register() {
        fetch("http://localhost:3000/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value,
          }),
        })
          .then((res) => {
            if (!res.ok) return res.text().then((text) => Promise.reject(text));
            return res.text();
          })
          .then((data) => {
            alert(data);
            window.location.href = "login.html";
          })
          .catch((errorMessage) => {
            alert(errorMessage);
          });
      }
    </script>
  </body>
</html>
