<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Staff — Hotel Management</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="dashboard.html" class="brand">Hotel Manager</a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="staff.html" class="active">Staff</a>
        <a href="assign-staff.html">Assign</a>
        <button class="btn btn-sm btn-secondary btn-logout" onclick="logout()">Logout</button>
      </div>
    </nav>

    <div class="page-wrapper">
      <div class="card">
        <h2>Add Staff</h2>
        <p class="subtitle">Register a new staff member</p>

        <form id="staff-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Full name" required />
          </div>

          <div class="form-group">
            <label for="role">Role</label>
            <input type="text" id="role" placeholder="e.g. Receptionist, Housekeeping" required />
          </div>

          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="text" id="phone" placeholder="Phone number" required />
          </div>

          <div class="form-group">
            <label for="salary">Salary (₹)</label>
            <input type="number" id="salary" placeholder="Monthly salary" required />
          </div>

          <button type="submit" class="btn btn-primary btn-full">Save Staff</button>
        </form>
      </div>
    </div>

    <script>
      const userData = localStorage.getItem("user");
      if (!userData) window.location.href = "login.html";
      try { const u = JSON.parse(userData); if (!u || !u.user_id) window.location.href = "login.html"; } catch { window.location.href = "login.html"; }

      document.getElementById("staff-form").addEventListener("submit", function (event) {
        event.preventDefault();
        fetch("http://localhost:3000/staff", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: document.getElementById("name").value,
            role: document.getElementById("role").value,
            phone: document.getElementById("phone").value,
            salary: Number(document.getElementById("salary").value),
          }),
        })
          .then((res) => res.text())
          .then((message) => alert(message));
      });

      function logout() {
        localStorage.removeItem("user");
        window.location.href = "login.html";
      }
    </script>
  </body>
</html>
